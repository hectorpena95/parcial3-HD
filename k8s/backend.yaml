apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-backend
  template:
    metadata:
      labels:
        app: tienda-backend
    spec:
      containers:
      - name: backend
        image: 381492165352.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-backend:latest
        ports:
        - containerPort: 3001
        env:                         
        - name: DB_HOST
          value: "tienda-db.tienda.svc.cluster.local" # <--- CAMBIA ESTA LÍNEA
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "root"
        - name: DB_NAME
          value: "tienda_perritos"
        - name: DB_PORT
          value: "3306"
---
apiVersion: v1
kind: Service
metadata:
  name: tienda-backend
  namespace: tienda
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 3001                 # <--- Corregido: Kubernetes recibe en 5000 y manda al 3001 de tu Node.js
  selector:
    app: tienda-backend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-db
  namespace: tienda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tienda-db
  template:
    metadata:
      labels:
        app: tienda-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root"
        - name: MYSQL_DATABASE
          value: "tienda_perritos"
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: tienda-db
  namespace: tienda
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: tienda-db

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-frontend
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-frontend
  template:
    metadata:
      labels:
        app: tienda-frontend
    spec:
      containers:
      - name: frontend
        image: 381492165352.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: tienda-frontend
  namespace: tienda
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: tienda-frontend