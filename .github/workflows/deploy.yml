name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Frontend to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/tienda-frontend:latest ./frontend
        docker push $ECR_REGISTRY/tienda-frontend:latest

    - name: Build, Tag, and Push Backend to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/tienda-backend:latest ./backend
        docker push $ECR_REGISTRY/tienda-backend:latest

    - name: Update Kubeconfig for Amazon EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name tienda-perritos-cluster

    - name: Deploy to Kubernetes Cluster (EKS)
      run: |
        # Crear el namespace 'tienda' por si acaso no existe en el clúster nuevo
        kubectl create namespace tienda --dry-run=client -o yaml | kubectl apply -f -
        
        if [ -d "./k8s" ]; then
          kubectl apply -f ./k8s/ -n tienda
        else
          kubectl rollout restart deployment tienda-frontend -n tienda
          kubectl rollout restart deployment tienda-backend -n tienda
        fi